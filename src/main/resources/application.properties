spring.application.name=taskvortex

spring.datasource.url=jdbc:mysql://localhost:3306/taskvortex_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Nilesh@2003
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.error.include-message=always


# Set server limits to 10MB so the 10MB ExceptionHandler can actually run
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Ensure Tomcat doesn't kill the connection abruptly
server.tomcat.max-swallow-size=-1